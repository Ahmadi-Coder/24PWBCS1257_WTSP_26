<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flexbox Form Builder</title>
  <link rel="stylesheet" href="../styles/form.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>Flexbox Form Builder</h1>
      <p class="lead">Responsive form sections, conditional fields, and multi-column desktop layout.</p>
    </header>

    <form id="profileForm" class="form" novalidate>
      <section class="form-section">
        <h2 class="section-title">Personal</h2>
        <div class="form-row">
          <label class="field">
            <span class="label-text">First name</span>
            <input type="text" name="first" required />
          </label>
          <label class="field">
            <span class="label-text">Last name</span>
            <input type="text" name="last" required />
          </label>
        </div>

        <div class="form-row">
          <label class="field">
            <span class="label-text">Email</span>
            <input type="email" name="email" required />
          </label>
          <label class="field">
            <span class="label-text">Phone</span>
            <input type="tel" name="phone" inputmode="tel" placeholder="+92 3xx xxx xxxx" />
          </label>
        </div>
      </section>

      <section class="form-section" id="addressSection">
        <h2 class="section-title">Address</h2>
        <div class="form-row address-row">
          <label class="field field--flex-2">
            <span class="label-text">Street</span>
            <input type="text" name="street" />
          </label>
          <label class="field">
            <span class="label-text">City</span>
            <input type="text" name="city" />
          </label>
          <label class="field">
            <span class="label-text">Postal</span>
            <input type="text" name="postal" inputmode="numeric" />
          </label>
        </div>

        <div class="form-row conditional-row" data-show-on="wide">
          <label class="field">
            <span class="label-text">State / Province</span>
            <input type="text" name="state" />
          </label>
          <label class="field">
            <span class="label-text">Country</span>
            <select name="country">
              <option>Pakistan</option>
              <option>United States</option>
              <option>United Kingdom</option>
              <option>Other</option>
            </select>
          </label>
        </div>
      </section>

      <section class="form-section">
        <h2 class="section-title">Preferences</h2>
        <div class="form-row">
          <label class="field">
            <span class="label-text">Newsletter</span>
            <select name="newsletter">
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
              <option value="never">Never</option>
            </select>
          </label>

          <label class="field">
            <span class="label-text">Notifications</span>
            <div class="inline-controls">
              <label class="small"><input type="checkbox" name="notify_email" /> Email</label>
              <label class="small"><input type="checkbox" name="notify_sms" /> SMS</label>
            </div>
          </label>
        </div>

        <div class="form-row">
          <label class="field field--full">
            <span class="label-text">Bio</span>
            <textarea name="bio" rows="3" placeholder="Short bio"></textarea>
          </label>
        </div>
      </section>

      <section class="form-section">
        <h2 class="section-title">Attachments</h2>
        <div class="form-row">
          <label class="field">
            <span class="label-text">Profile Photo</span>
            <input type="file" name="avatar" accept="image/*" />
          </label>

          <label class="field">
            <span class="label-text">Experience (years)</span>
            <input type="number" name="exp" min="0" max="50" />
          </label>
        </div>

        <div class="form-actions">
          <button type="reset" class="btn btn--muted">Reset</button>
          <button type="submit" class="btn btn--primary">Save Profile</button>
        </div>
      </section>
    </form>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const conditionalRows = document.querySelectorAll('.conditional-row');
      const mqWide = window.matchMedia('(min-width:1000px)');

      function updateConditional() {
        conditionalRows.forEach(row => {
          const showOn = row.dataset.showOn;
          if (showOn === 'wide') {
            row.style.display = mqWide.matches ? 'flex' : 'none';
          }
        });
      }

      updateConditional();
      if (mqWide.addEventListener) {
        mqWide.addEventListener('change', updateConditional);
      } else {
        mqWide.addListener(updateConditional); // fallback for older browsers
      }

      // Example DOM reflow: move city field between sections based on width
      const addressSection = document.getElementById('addressSection');
      const profileForm = document.getElementById('profileForm');
      const cityField = profileForm.querySelector('input[name="city"]');

      function reflowCity() {
        if (!cityField) return;
        const cityWrapper = cityField.closest('.field');
        if (mqWide.matches) {
          addressSection.querySelector('.address-row')?.appendChild(cityWrapper);
        } else {
          const personalSection = profileForm.querySelector('.form-section');
          personalSection.querySelector('.form-row')?.appendChild(cityWrapper);
        }
      }

      reflowCity();
      if (mqWide.addEventListener) {
        mqWide.addEventListener('change', reflowCity);
      } else {
        mqWide.addListener(reflowCity);
      }

      // Simple validation demo
      profileForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const email = profileForm.querySelector('input[name="email"]');
        if (!email.checkValidity()) {
          email.focus();
          alert('Please enter a valid email.');
          return;
        }
        alert('Profile saved (demo).');
      });
    });
  </script>
</body>
</html>
